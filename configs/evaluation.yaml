rule_based:
  weights:
    goal_alignment: 0.25
    schedule_compliance: 0.2
    limitation_handling: 0.2
    tradeoff_handling: 0.2
    progression_coherence: 0.15
  limitation_keywords:
    lower-back: ["lower-back", "back", "spine", "supported", "machine", "avoid heavy"]
    knee: ["knee", "pain-tolerable", "low-impact", "bike", "elliptical", "modify"]
    upper-limb: ["single-arm", "unilateral", "grip", "machine", "modified", "ROM", "range"]
    calf: ["calf", "low-impact", "easy run", "run-walk", "elliptical", "bike"]

llm_judge:
  max_tokens: 1024
  temperature: 0.0
  top_p: 1.0
  scale_min: 1
  scale_max: 10
  prompt_path: "prompts/judge_rubric.txt"
  metrics:
    - goal_alignment
    - constraint_adherence
    - safety
    - tradeoff_handling
    - progression_coherence
