default:
  prompt_version: "v1"
  temperature: 0.7
  top_p: 0.9
  max_tokens: 2048
  seed: 42

conditions:
  A:
    model_alias: "tiny"
    prompt_key: "direct"
    runner: "direct"
    system_type: "direct_planner"
  B:
    model_alias: "small"
    prompt_key: "direct"
    runner: "direct"
    system_type: "direct_planner"
  C:
    model_alias: "small"
    prompt_key: "structured"
    runner: "direct"
    system_type: "structured_planner"
  D:
    model_alias: "strong"
    prompt_key: "direct"
    runner: "direct"
    system_type: "direct_planner"
  E:
    workflow_model_alias: "small"
    runner: "workflow"
    system_type: "langgraph_workflow_planner"
  F:
    workflow_model_alias: "tiny"
    runner: "workflow"
    system_type: "langgraph_workflow_planner"
  G:
    model_alias: "tiny"
    prompt_key: "structured"
    runner: "direct"
    system_type: "structured_planner"
  H:
    model_alias: "strong"
    prompt_key: "structured"
    runner: "direct"
    system_type: "structured_planner"
  I:
    workflow_model_alias: "small"
    runner: "workflow"
    system_type: "langgraph_refined_workflow_planner"
    workflow: &workflow_refined_stable
      max_revision_loops: 0
      strip_think_blocks: true
      use_full_persona_context: true
      node_generation_overrides:
        profile_extractor:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 512
        goal_prioritizer:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 512
        draft_planner:
          temperature: 0.2
          top_p: 0.9
          max_tokens: 3072
        safety_checker:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 512
        constraint_checker:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 512
        tradeoff_checker:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 512
        reviser_formatter:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 3072
  J:
    workflow_model_alias: "tiny"
    runner: "workflow"
    system_type: "langgraph_refined_workflow_planner"
    workflow: *workflow_refined_stable
  K:
    workflow_model_alias: "small"
    runner: "localized_workflow"
    system_type: "localized_patch_workflow_planner"
    workflow: &workflow_localized_patch
      strip_think_blocks: true
      use_full_persona_context: true
      postcheck_after_revision: true
      node_generation_overrides:
        profile_extractor:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 512
        goal_prioritizer:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 512
        draft_planner:
          temperature: 0.2
          top_p: 0.9
          max_tokens: 3072
        safety_localized_checker:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 640
        constraint_localized_checker:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 640
        tradeoff_localized_checker:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 640
        localized_review_normalizer:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 512
        localized_reviser_formatter:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 3072
  L:
    workflow_model_alias: "tiny"
    runner: "localized_workflow"
    system_type: "localized_patch_workflow_planner"
    workflow: *workflow_localized_patch
  M:
    workflow_model_alias: "small"
    runner: "dynamic_workflow"
    system_type: "dynamic_multi_agent_planner"
    workflow: &workflow_dynamic_multi_agent
      max_revision_loops: 1
      strip_think_blocks: true
      use_full_persona_context: true
      use_final_formatter: false
      node_generation_overrides:
        profile_extractor:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 512
        goal_prioritizer:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 512
        draft_planner:
          temperature: 0.2
          top_p: 0.9
          max_tokens: 2048
        safety_checker:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 384
        constraint_checker:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 384
        tradeoff_checker:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 384
        safety_fixer:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 2048
        constraint_fixer:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 2048
        tradeoff_fixer:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 2048
        dynamic_formatter:
          temperature: 0.0
          top_p: 1.0
          max_tokens: 2048
  N:
    workflow_model_alias: "tiny"
    runner: "dynamic_workflow"
    system_type: "dynamic_multi_agent_planner"
    workflow: *workflow_dynamic_multi_agent
